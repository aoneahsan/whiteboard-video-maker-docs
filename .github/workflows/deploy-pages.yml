# GitHub Pages deploy for Whiteboard Video Maker docs.
#
# Builds the Docusaurus site and publishes it to GitHub Pages. This is a
# SECOND hosting target alongside Firebase Hosting (see firebase.json +
# DEPLOY.md); both serve the same `build/` output.
#
# The custom domain is set by static/CNAME (docs.wbamai.aoneahsan.com).
# Enable Pages once in the repo: Settings -> Pages -> Source = GitHub Actions.
#
# NOTE: the actual deploy is USER-ONLY — the agent never triggers it. Enabling
# Pages + attaching the DNS CNAME record is a one-time owner action.
name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable Corepack (Yarn)
        run: corepack enable
      - name: Install dependencies
        run: yarn install --immutable
      - name: Build
        run: yarn build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
